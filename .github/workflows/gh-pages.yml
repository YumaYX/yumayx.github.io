name: Deploy Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4'
          bundler-cache: true
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Build with jekyll
        # Outputs to the './_site' directory by default
        run: |
          ruby app.rb
          rm -f sample.markdown
          bundle exec jekyll build
          #sed -z "s/\s\s//g; s/\n//g; s/> </></g" _site/index.html -i
          ruby -e 'puts ARGF.read.gsub(/\/\*[\s\S]*?\*\//, "").gsub(/\s{2,}/, " ")' assets/css/skeleton.css  | grep -v ^$ | sed -z 's/\n//g;s/\s{/{/g;s/{\s/{/g;s@\s}@}@g;s@}\s@}@g;s@,\s@,@g;s@;}@}@g;s@:\s@:@g;s/;\s/;/g' > tmp && mv tmp _site/assets/css/skeleton.css
          ruby -e 'puts ARGF.read.gsub(/\/\*[\s\S]*?\*\//, "").gsub(/\s{2,}/, " ")' assets/css/extends.css   | grep -v ^$ | sed -z 's/\n//g;s/\s{/{/g;s/{\s/{/g;s@\s}@}@g;s@}\s@}@g;s@,\s@,@g;s@;}@}@g;s@:\s@:@g;s/;\s/;/g' > tmp && mv tmp _site/assets/css/extends.css

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

